app-id: com.headlessflower.Promptr
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk
command: promptr

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=home:ro
  - --filesystem=xdg-documents:ro
  - --filesystem=xdg-download:ro
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - python3-requirements-flatpak.json

  - name: promptr
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --no-build-isolation --no-deps --prefix=${FLATPAK_DEST} .
      - install -D data/com.headlessflower.Promptr.desktop /app/share/applications/com.headlessflower.Promptr.desktop
      - install -D data/com.headlessflower.Promptr.metainfo.xml /app/share/metainfo/com.headlessflower.Promptr.metainfo.xml
      - install -D data/icons/hicolor/scalable/apps/com.headlessflower.Promptr.svg /app/share/icons/hicolor/scalable/apps/com.headlessflower.Promptr.svg
      - install -D data/com.headlessflower.Promptr.gschema.xml /app/share/glib-2.0/schemas/com.headlessflower.Promptr.gschema.xml
      - glib-compile-schemas /app/share/glib-2.0/schemas
    sources:
      - type: git
      - url: https://github.com/headlessflower/promptr.git
      - tag: v0.1.0
